<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Merlot Gamez Studio</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0b1020;
    color: #e6e8ef;
    display: flex;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  main { max-width: 640px; text-align: center; }
  h1 { font-size: 2.4rem; margin: 0 0 .25rem; letter-spacing: -.02em; }
  .tag { color: #9aa3b8; margin: 0 0 2rem; }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-top: 2rem;
  }
  @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }
  .card {
    display: block;
    padding: 1.25rem 1rem;
    border-radius: 12px;
    background: #161c33;
    color: inherit;
    text-decoration: none;
    border: 1px solid #232a47;
    transition: transform .15s, border-color .15s;
  }
  .card:hover { transform: translateY(-2px); border-color: #4f7cff; }
  .card h2 { margin: 0 0 .25rem; font-size: 1.1rem; }
  .card p { margin: 0; color: #9aa3b8; font-size: .9rem; }
  footer { margin-top: 3rem; color: #6b7390; font-size: .85rem; }
</style>
</head>
<body>
<main>
  <h1>Merlot Gamez Studio</h1>
  <p class="tag">Casual mobile games — built with care.</p>

  <h2 style="margin-top:2rem;font-size:1rem;color:#9aa3b8;letter-spacing:.04em;text-transform:uppercase;">Our Games</h2>
  <p style="margin:.5rem 0 0;font-size:1.2rem;">TileFrenzy: Triple Match</p>

  <div class="grid">
    <a class="card" href="support.html">
      <h2>Support</h2>
      <p>Help, contact, and FAQs</p>
    </a>
    <a class="card" href="privacy.html">
      <h2>Privacy Policy</h2>
      <p>How we handle your data</p>
    </a>
  </div>

  <footer>&copy; 2026 Merlot Gamez Studio</footer>
</main>
</body>
</html>
